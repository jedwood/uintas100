<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Locator — Uintas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               height: 100vh; display: flex; flex-direction: column; background: #0f172a; color: #e2e8f0; }
        #topbar { display: flex; align-items: center; gap: 16px; padding: 8px 14px; background: #1e293b;
                  border-bottom: 1px solid #334155; flex-shrink: 0; }
        #topbar h1 { font-size: 15px; margin: 0; font-weight: 600; white-space: nowrap; }
        #progress-wrap { flex: 1; max-width: 420px; }
        #progress-bar-bg { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
        #progress-bar { height: 100%; background: #38bdf8; width: 0%; transition: width .3s; }
        #progress-text { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        select, button { font-family: inherit; }
        #filter { background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px;
                  padding: 5px 8px; font-size: 13px; }
        #main { flex: 1; display: flex; min-height: 0; }
        #map { flex: 1; min-width: 0; }
        #panel { width: 380px; flex-shrink: 0; background: #1e293b; border-left: 1px solid #334155;
                 overflow-y: auto; padding: 16px; }
        .desig { font-size: 26px; font-weight: 700; color: #f1f5f9; }
        .desig .name { color: #38bdf8; }
        .drainage { color: #94a3b8; font-size: 14px; margin: 2px 0 12px; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px;
                 font-weight: 600; vertical-align: middle; margin-left: 8px; }
        .badge.unplaced { background: #475569; color: #cbd5e1; }
        .badge.seed_unverified { background: #ca8a04; color: #1c1917; }
        .badge.seed_suspect { background: #dc2626; color: #fff; }
        .badge.confirmed, .badge.manual { background: #16a34a; color: #fff; }
        .badge.plss_estimate { background: #06b6d4; color: #083344; }
        .badge.cant_find { background: #7c3aed; color: #fff; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
        .stat { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 10px; }
        .stat .k { font-size: 11px; color: #94a3b8; }
        .stat .v { font-size: 15px; font-weight: 600; color: #e2e8f0; }
        .section { margin: 14px 0; }
        .section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
                      color: #64748b; margin: 0 0 6px; }
        .notes { font-size: 13px; line-height: 1.5; color: #cbd5e1; background: #0f172a;
                 border: 1px solid #334155; border-radius: 8px; padding: 10px; max-height: 160px;
                 overflow-y: auto; white-space: pre-wrap; }
        .drainage-map { width: 100%; border-radius: 8px; border: 1px solid #334155; cursor: zoom-in; }
        .pamphlet-links a { display: inline-block; font-size: 12px; color: #38bdf8; text-decoration: none;
                            background: #0f172a; border: 1px solid #334155; border-radius: 6px;
                            padding: 4px 8px; margin: 2px 4px 2px 0; }
        .actions { position: sticky; bottom: 0; background: #1e293b; padding-top: 12px; margin-top: 16px;
                   border-top: 1px solid #334155; }
        .actions .row { display: flex; gap: 8px; }
        button.act { flex: 1; border: none; border-radius: 8px; padding: 10px; font-size: 13px;
                     font-weight: 600; cursor: pointer; }
        button.confirm { background: #16a34a; color: #fff; }
        button.confirm:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        button.skip { background: #475569; color: #e2e8f0; }
        button.cant { background: #7c3aed; color: #fff; }
        button.nav { background: #334155; color: #e2e8f0; }
        .hint { font-size: 11px; color: #64748b; margin-top: 8px; line-height: 1.6; }
        .hint kbd { background: #0f172a; border: 1px solid #475569; border-radius: 4px; padding: 1px 5px;
                    font-family: monospace; font-size: 10px; }
        .coordline { font-size: 11px; color: #64748b; margin-top: 6px; font-family: monospace; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #16a34a;
                 color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; opacity: 0;
                 transition: opacity .2s; pointer-events: none; z-index: 9999; }
        #toast.show { opacity: 1; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none;
                    align-items: center; justify-content: center; z-index: 9998; cursor: zoom-out; }
        .lightbox img { max-width: 96vw; max-height: 96vh; }
    </style>
</head>
<body>
    <div id="topbar">
        <h1>🎣 Lake Locator</h1>
        <div id="progress-wrap">
            <div id="progress-bar-bg"><div id="progress-bar"></div></div>
            <div id="progress-text">Loading…</div>
        </div>
        <select id="filter">
            <option value="needs-work">Needs work (unplaced + seeds)</option>
            <option value="suspect">⚠ Suspect seeds only</option>
            <option value="unplaced">Unplaced only</option>
            <option value="seeds">Seeds to verify</option>
            <option value="plss">◆ PLSS estimates (Forest Service TRS)</option>
            <option value="done">Done (confirmed/manual)</option>
            <option value="all">All lakes</option>
        </select>
        <select id="drainage-filter"><option value="">All drainages</option></select>
    </div>

    <div id="main">
        <div id="map"></div>
        <div id="panel"><div style="color:#64748b">Loading lakes…</div></div>
    </div>

    <div id="toast"></div>
    <div class="lightbox" id="lightbox"><img id="lightbox-img" src=""></div>

    <script>
    // ---- Basemaps ----------------------------------------------------------
    // Esri satellite for seeing the actual water; USGS topo (what CalTopo's
    // MapBuilder is largely built from) for named outlines; OpenTopoMap for
    // contours. To add CalTopo's own MapBuilder tiles, drop a {name,url,opts}
    // entry here if your account/terms permit it.
    const BASEMAPS = [
        { name: 'Esri Satellite', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          opts: { maxZoom: 19, attribution: 'Esri World Imagery' } },
        { name: 'USGS Topo', url: 'https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',
          opts: { maxZoom: 16, attribution: 'USGS The National Map' } },
        { name: 'USGS Imagery+Topo', url: 'https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}',
          opts: { maxZoom: 16, attribution: 'USGS The National Map' } },
        { name: 'OpenTopoMap', url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
          opts: { maxZoom: 17, attribution: 'OpenTopoMap (CC-BY-SA)' } },
    ];

    const UINTA_CENTER = [40.72, -110.40];
    let lakes = [], queue = [], qIndex = 0, current = null;
    let marker = null, neighborLayer = null;

    const map = L.map('map', { zoomControl: true }).setView(UINTA_CENTER, 9);
    const layers = {};
    BASEMAPS.forEach((b, i) => {
        layers[b.name] = L.tileLayer(b.url, b.opts);
        if (i === 0) layers[b.name].addTo(map);
    });
    L.control.layers(layers, null, { collapsed: false, position: 'topright' }).addTo(map);
    neighborLayer = L.layerGroup().addTo(map);

    // Clicking the map drops/moves the pin for the current lake
    map.on('click', e => { if (current) setMarker(e.latlng.lat, e.latlng.lng); });

    function setConfirmEnabled(enabled) {
        // The confirm button only exists after the panel renders; guard for the
        // first showLake call where setMarker/clearMarker run before that.
        const b = document.getElementById('btn-confirm');
        if (b) b.disabled = !enabled;
    }
    function setMarker(lat, lng) {
        if (marker) { marker.setLatLng([lat, lng]); }
        else {
            marker = L.marker([lat, lng], { draggable: true });
            marker.on('dragend', () => updateCoordLine());
            marker.addTo(map);
        }
        updateCoordLine();
        setConfirmEnabled(true);
    }
    function clearMarker() {
        if (marker) { map.removeLayer(marker); marker = null; }
        setConfirmEnabled(false);
    }
    function markerLatLng() { return marker ? marker.getLatLng() : null; }
    function updateCoordLine() {
        const el = document.getElementById('coordline');
        const ll = markerLatLng();
        if (el) el.textContent = ll ? `pin: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}` : 'no pin placed';
    }

    function statusLabel(s) {
        return ({ seed_unverified: 'seed', seed_suspect: 'suspect ⚠', confirmed: 'confirmed',
                  manual: 'placed', plss_estimate: 'PLSS est ◆', cant_find: "can't find" })[s] || 'unplaced';
    }

    async function load() {
        const res = await fetch('/api/lakes');
        lakes = (await res.json()).lakes;
        const dsel = document.getElementById('drainage-filter');
        [...new Set(lakes.map(l => l.drainage))].sort().forEach(d => {
            const o = document.createElement('option'); o.value = d; o.textContent = d; dsel.appendChild(o);
        });
        rebuildQueue();
    }

    function matchesFilter(l, mode) {
        const s = l.coord_status;
        const placed = s === 'confirmed' || s === 'manual';
        switch (mode) {
            case 'needs-work': return !placed && s !== 'cant_find';
            case 'suspect': return s === 'seed_suspect';
            case 'unplaced': return !l.lat && s !== 'cant_find';
            case 'seeds': return s === 'seed_unverified' || s === 'seed_suspect';
            case 'plss': return s === 'plss_estimate';
            case 'done': return placed;
            default: return true;
        }
    }

    function rebuildQueue() {
        const mode = document.getElementById('filter').value;
        const dr = document.getElementById('drainage-filter').value;
        queue = lakes.filter(l => matchesFilter(l, mode) && (!dr || l.drainage === dr));
        // Suspects first, then unplaced, then seeds; within that by drainage+designation
        const rank = l => l.coord_status === 'seed_suspect' ? 0 : !l.lat ? 1 : 2;
        queue.sort((a, b) => rank(a) - rank(b) || a.drainage.localeCompare(b.drainage)
                    || a.letter_number.localeCompare(b.letter_number));
        qIndex = 0;
        updateProgress();
        if (queue.length) showLake(queue[0]); else renderEmpty();
    }

    function updateProgress() {
        const done = lakes.filter(l => ['confirmed', 'manual'].includes(l.coord_status)).length;
        const total = lakes.length;
        document.getElementById('progress-bar').style.width = `${100 * done / total}%`;
        document.getElementById('progress-text').textContent =
            `${done} / ${total} located • queue: ${queue.length} (#${Math.min(qIndex + 1, queue.length)})`;
    }

    function drawNeighbors(lake) {
        neighborLayer.clearLayers();
        lakes.filter(l => l.drainage === lake.drainage && l.id !== lake.id && l.lat)
            .forEach(l => {
                const done = ['confirmed', 'manual'].includes(l.coord_status);
                const dotColor = done ? '#22c55e'
                    : l.coord_status === 'plss_estimate' ? '#06b6d4' : '#eab308';
                L.circleMarker([l.lat, l.lng], {
                    radius: 5, color: dotColor, weight: 1,
                    fillOpacity: 0.5, opacity: 0.7
                }).bindTooltip(`${l.letter_number}${l.name ? ' ' + l.name : ''}`, { direction: 'top' })
                  .addTo(neighborLayer);
            });
    }

    function bestCenter(lake) {
        if (lake.lat) return [lake.lat, lake.lng];
        // center on the drainage's other placed lakes
        const pts = lakes.filter(l => l.drainage === lake.drainage && l.lat);
        if (pts.length) return [pts.reduce((s, l) => s + l.lat, 0) / pts.length,
                                 pts.reduce((s, l) => s + l.lng, 0) / pts.length];
        return UINTA_CENTER;
    }

    function showLake(lake) {
        current = lake;
        clearMarker();
        drawNeighbors(lake);
        const center = bestCenter(lake);
        map.setView(center, lake.lat ? 15 : 12);
        if (lake.lat) setMarker(lake.lat, lake.lng);

        const titleName = lake.name ? `<span class="name">${lake.name}</span> ` : '';
        const status = lake.coord_status || 'unplaced';
        const fishLine = [lake.fish_species, lake.size_acres && `${lake.size_acres} ac`,
                          lake.max_depth_ft && `${lake.max_depth_ft} ft deep`,
                          lake.elevation_ft && `${lake.elevation_ft.toLocaleString()} ft`]
                          .filter(Boolean).join(' • ');
        const dwr = (lake.dwr_notes || '').trim();
        const june = (lake.junesucker_notes || '').replace(/^##\s*/gm, '').trim();

        document.getElementById('panel').innerHTML = `
            <div class="desig">${titleName}${lake.letter_number}
                <span class="badge ${status}">${statusLabel(status)}</span></div>
            <div class="drainage">${lake.drainage}</div>
            <div class="stat" style="margin-bottom:10px">
                <div class="k">species / size / depth / elevation</div>
                <div class="v" style="font-size:13px;font-weight:500">${fishLine || '—'}</div>
            </div>

            ${dwr ? `<div class="section"><h3>DWR notes (often locational)</h3>
                     <div class="notes">${escapeHtml(dwr)}</div></div>` : ''}
            ${june ? `<div class="section"><h3>Junesucker notes</h3>
                      <div class="notes">${escapeHtml(june)}</div></div>` : ''}

            <div class="section">
                <h3>Drainage map ${lake.pamphlets.length ? '· pamphlet has designations' : ''}</h3>
                ${lake.drainage_map ? `<img class="drainage-map" src="${lake.drainage_map}"
                     onclick="openLightbox('${lake.drainage_map}')">` : '<div class="hint">no map image</div>'}
                <div class="pamphlet-links" style="margin-top:6px">
                    ${lake.pamphlets.map(p => `<a href="${p}" target="_blank">📄 ${p.split('/').pop()}</a>`).join('')}
                </div>
            </div>

            <div class="actions">
                <div class="coordline" id="coordline">no pin placed</div>
                <div class="row" style="margin:8px 0">
                    <button class="act confirm" id="btn-confirm" onclick="saveCurrent('confirmed')" disabled>
                        ✓ Confirm <span style="opacity:.7">(Enter)</span></button>
                    <button class="act cant" onclick="saveCurrent('cant_find')">Can't find (F)</button>
                </div>
                <div class="row">
                    <button class="act nav" onclick="go(-1)">← Prev (P)</button>
                    <button class="act skip" onclick="go(1)">Skip (S) →</button>
                </div>
                <div class="hint">
                    Click the map to drop a pin, or drag it to fine-tune. Faint dots are this
                    drainage's other lakes (<span style="color:#eab308">●</span> seeded,
                    <span style="color:#06b6d4">●</span> PLSS est, <span style="color:#22c55e">●</span> done)
                    — use them to triangulate.<br>
                    <kbd>Enter</kbd> confirm · <kbd>F</kbd> can't find · <kbd>S</kbd>/<kbd>→</kbd> skip ·
                    <kbd>P</kbd>/<kbd>←</kbd> prev
                </div>
            </div>`;
        updateCoordLine();
        setConfirmEnabled(!!marker);  // re-sync now that the button exists
        updateProgress();
    }

    function renderEmpty() {
        current = null; clearMarker(); neighborLayer.clearLayers();
        document.getElementById('panel').innerHTML =
            `<div style="color:#64748b;padding:20px 0">Nothing in this queue. 🎉<br><br>
             Try a different filter above.</div>`;
    }

    async function saveCurrent(status) {
        if (!current) return;
        const ll = markerLatLng();
        if (status !== 'cant_find' && !ll) { toast('Drop a pin first', true); return; }
        const body = { letter_number: current.letter_number, status,
                       lat: ll ? ll.lat : null, lng: ll ? ll.lng : null };
        const res = await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                               body: JSON.stringify(body) });
        const out = await res.json();
        if (!out.ok) { toast('Save failed: ' + out.message, true); return; }
        // reflect locally
        current.coord_status = status;
        if (ll) { current.lat = ll.lat; current.lng = ll.lng; current.coord_source = 'manual'; }
        toast(status === 'cant_find' ? "Marked can't find" : `Saved ${current.letter_number} ✓`);
        // remove from queue if it no longer matches the filter
        if (!matchesFilter(current, document.getElementById('filter').value)) {
            queue.splice(qIndex, 1);
            if (qIndex >= queue.length) qIndex = Math.max(0, queue.length - 1);
            queue.length ? showLake(queue[qIndex]) : renderEmpty();
        } else { go(1); }
        updateProgress();
    }

    function go(delta) {
        if (!queue.length) return;
        qIndex = (qIndex + delta + queue.length) % queue.length;
        showLake(queue[qIndex]);
    }

    function toast(msg, isErr) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.background = isErr ? '#dc2626' : '#16a34a';
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1400);
    }
    function escapeHtml(s) {
        return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    document.getElementById('lightbox').onclick = function () { this.style.display = 'none'; };

    document.getElementById('filter').addEventListener('change', rebuildQueue);
    document.getElementById('drainage-filter').addEventListener('change', rebuildQueue);

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.key === 'Enter') { e.preventDefault(); if (!document.getElementById('btn-confirm')?.disabled) saveCurrent('confirmed'); }
        else if (e.key === 'f' || e.key === 'F') saveCurrent('cant_find');
        else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowRight') go(1);
        else if (e.key === 'p' || e.key === 'P' || e.key === 'ArrowLeft') go(-1);
    });

    load();
    </script>
</body>
</html>
